name: Get PR Number
description: "Deprecated: Use bcgov/actions/get-pr instead"
branding:
  icon: package
  color: blue

inputs:
  debug:
    description: Enable debug logging
    default: "false"
  github_token:
    description: Specify token (GH or PAT), instead of inheriting one from the calling workflow
    default: ${{ github.token }}

outputs:
  pr:
    description: "Associated pull request number"
    value: ${{ steps.get_pr.outputs.pr }}

runs:
  using: composite
  steps:
    - name: Deprecation Warning
      shell: bash
      run: |
        echo "::warning::This repository is deprecated. Please update your workflow to use bcgov/actions/get-pr instead."
    - name: Delegate to consolidated action
      id: get_pr
      uses: bcgov/actions/get-pr@v0.2.0
      with:
        debug: ${{ inputs.debug }}
        github_token: ${{ inputs.github_token }}
