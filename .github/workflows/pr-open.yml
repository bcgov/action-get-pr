name: Test

on:
  merge_group:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Dump GitHub Context.Event
  dump:
    name: Event details
    runs-on: ubuntu-24.04
    steps:
      - name: Event details
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.event.action: ${{ github.event.action }}"
          echo "${GITHUB_CONTEXT}" | jq .

  # Test for PR, merge queue and merge to main using the local Node.js action
  get-pr:
    name: Get PR number
    runs-on: ubuntu-24.04
    outputs:
      pr: ${{ steps.vars.outputs.pr }}
    steps:
      - uses: actions/checkout@v6
      - id: vars
        uses: ./

  # Verify standard end-to-end pull request scenario output
  verify-pr:
    name: Verify PR number
    needs: [get-pr]
    env:
      pr: ${{ needs.get-pr.outputs.pr }}
    runs-on: ubuntu-24.04
    steps:
      - name: Verify PR number
        run: |
          # Check needs.get-pr.outputs.pr
          [ ! -z "${{ env.pr }}" ] || \
            (echo "No PR number" && exit 1)
          echo "PR: ${{ env.pr }}"

  # Comprehensive mock integration test suite.
  # Note: Standard GITHUB_* environment variables are read-only inside GHA steps.
  # We use TEST_* counterparts to override and test specific event flows in CI.
  test-scenarios:
    name: Test Scenarios
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Scenario 1: Mock a standard pull request event
      # We generate a minimal JSON event payload on disk to test native payload parsing.
      - name: Test PR event
        run: |
          echo '{"pull_request": {"number": 40}}' > /tmp/event-pr.json
          TEST_EVENT_NAME=pull_request TEST_EVENT_PATH=/tmp/event-pr.json node index.js > output.txt
          cat output.txt
          grep -q "PR: 40" output.txt || (echo "FAILED: PR event" && exit 1)

      # Scenario 2: Mock a Merge Queue event
      # We generate a minimal JSON event payload on disk to test native payload parsing.
      - name: Test Merge Queue event
        run: |
          echo '{"merge_group": {"head_ref": "queue/main/pr-40-abcdef"}}' > /tmp/event-mq.json
          TEST_EVENT_NAME=merge_group TEST_EVENT_PATH=/tmp/event-mq.json node index.js > output.txt
          cat output.txt
          grep -q "PR: 40" output.txt || (echo "FAILED: Merge Queue event" && exit 1)

      # Scenario 3: Live API integration test for a Push event (PR Merge)
      # We target the actual squash-merged commit SHA of PR #39: 8f9a16a1f7a7574b10e2fb473bfef0c4c4fff3d6.
      - name: Test Push event (PR Merge)
        env:
          TEST_EVENT_NAME: push
          TEST_EVENT_AFTER: 8f9a16a1f7a7574b10e2fb473bfef0c4c4fff3d6
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_REPOSITORY: ${{ github.repository }}
        run: |
          output=$(node index.js)
          echo "$output"
          echo "$output" | grep -q "PR: 39" || (echo "FAILED: Push event" && exit 1)

      # Scenario 4: Live API integration test for a Release event
      # We target the same historical commit SHA of PR #39 (associated with tag v0.2.1).
      - name: Test Release event (PR Merge)
        env:
          TEST_EVENT_NAME: release
          TEST_SHA: 8f9a16a1f7a7574b10e2fb473bfef0c4c4fff3d6
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_REPOSITORY: ${{ github.repository }}
        run: |
          output=$(node index.js)
          echo "$output"
          echo "$output" | grep -q "PR: 39" || (echo "FAILED: Release event" && exit 1)

      # Scenario 5: Live API integration test for manual Workflow Dispatch event
      # We target the same historical commit SHA of PR #39.
      - name: Test Workflow Dispatch event (PR Merge)
        env:
          TEST_EVENT_NAME: workflow_dispatch
          TEST_SHA: 8f9a16a1f7a7574b10e2fb473bfef0c4c4fff3d6
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_REPOSITORY: ${{ github.repository }}
        run: |
          output=$(node index.js)
          echo "$output"
          echo "$output" | grep -q "PR: 39" || (echo "FAILED: Workflow Dispatch event" && exit 1)

      # Scenario 6: Direct Push / Cowboy Protection fail-fast test
      # We mock a direct push to main with a fake commit SHA (0000000...) that has no PR.
      # The action must exit non-zero (fail), proving direct pushes are blocked from deployments!
      - name: Test Direct Push (Cowboy Fail-Fast)
        env:
          TEST_EVENT_NAME: push
          TEST_EVENT_AFTER: 0000000000000000000000000000000000000000
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_REPOSITORY: ${{ github.repository }}
        run: |
          # This should fail (exit non-zero)
          if node index.js; then
            echo "FAILED: Direct push should have failed"
            exit 1
          else
            echo "PASSED: Direct push failed as expected!"
          fi
